<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title> snake </title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Cairo', 'Segoe UI', 'Tahoma', sans-serif;
        }
        /* واجهة اللعبة - طبقة فوق الـ Canvas */
        .ui {
            position: absolute;
            top: 20px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            box-sizing: border-box;
            z-index: 10;
            pointer-events: none;
        }
        .score-panel {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            padding: 10px 20px;
            border-radius: 50px;
            color: #ffd966;
            font-weight: bold;
            font-size: 1.5rem;
            font-family: monospace;
            border-left: 4px solid #ffaa33;
            border-right: 4px solid #ffaa33;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            pointer-events: auto;
        }
        .score-panel span {
            color: white;
            font-size: 1.8rem;
            margin-left: 10px;
            background: #2c2e1e;
            padding: 2px 12px;
            border-radius: 40px;
        }
        .restart-btn {
            background: #ff7b2c;
            border: none;
            font-size: 1.2rem;
            font-weight: bold;
            padding: 8px 22px;
            border-radius: 40px;
            color: #2d1b0a;
            cursor: pointer;
            font-family: inherit;
            box-shadow: 0 4px 0 #a13f12;
            transition: 0.07s linear;
            pointer-events: auto;
        }
        .restart-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #a13f12;
        }
        .status-box {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            padding: 6px 18px;
            border-radius: 40px;
            color: #ffdca8;
            font-weight: bold;
            font-size: 1rem;
            letter-spacing: 1px;
            pointer-events: auto;
        }
        .hunger-bar-container {
            position: absolute;
            bottom: 25px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.6);
            border-radius: 20px;
            height: 20px;
            backdrop-filter: blur(5px);
            z-index: 10;
            pointer-events: none;
            border: 1px solid #f3b35e;
        }
        .hunger-fill {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #6fbf4c, #f5a623);
            border-radius: 20px;
            transition: width 0.2s linear;
        }
        .hunger-text {
            position: absolute;
            bottom: 50px;
            left: 20px;
            background: rgba(0,0,0,0.5);
            padding: 2px 12px;
            border-radius: 20px;
            color: #ffefb9;
            font-size: 0.8rem;
            font-weight: bold;
            pointer-events: none;
            font-family: monospace;
        }
        @media (max-width: 700px) {
            .score-panel { font-size: 1rem; padding: 6px 12px; }
            .score-panel span { font-size: 1.3rem; }
            .restart-btn { padding: 5px 14px; font-size: 1rem; }
            .status-box { font-size: 0.7rem; }
        }
    </style>
</head>
<body>
    <div class="ui">
        <div class="score-panel">🍎 التفاحات <span id="scoreValue">0</span></div>
        <button class="restart-btn" id="resetButton">🐍 سلم جديد</button>
        <div class="status-box" id="gameStatus">🌟 نشط</div>
    </div>
    <div class="hunger-bar-container">
        <div class="hunger-fill" id="hungerFill" style="width: 100%;"></div>
    </div>
    <div class="hunger-text">⏳ جوع: ينقص مع الوقت - أكل التفاح يعيد الشبع</div>

    <!-- استيراد Three.js والمكتبات المساعدة -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';
        
        // ---------- إعداد المشهد 3D ----------
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x071a2b);
        scene.fog = new THREE.FogExp2(0x071a2b, 0.008);
        
        // كاميرا إيزومترية مائلة (منظر علوي مائل)
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(18, 14, 18);
        camera.lookAt(0, 0, 0);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true; // ظلال جميلة
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);
        
        // CSS2DRenderer للنص فوق التفاح (اختياري)
        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);
        
        // إضاءة ناعمة درامية
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        const mainLight = new THREE.DirectionalLight(0xfff5c0, 1.2);
        mainLight.position.set(8, 12, 5);
        mainLight.castShadow = true;
        mainLight.receiveShadow = true;
        mainLight.shadow.mapSize.width = 1024;
        mainLight.shadow.mapSize.height = 1024;
        scene.add(mainLight);
        const fillLight = new THREE.PointLight(0x5577aa, 0.4);
        fillLight.position.set(-3, 5, 4);
        scene.add(fillLight);
        const backLight = new THREE.PointLight(0xffaa66, 0.3);
        backLight.position.set(0, 5, -6);
        scene.add(backLight);
        
        // أرضية شبكية جميلة (سلم)
        const gridHelper = new THREE.GridHelper(28, 20, 0xaa9977, 0x7c6e4e);
        gridHelper.position.y = -1.2;
        gridHelper.material.transparent = true;
        gridHelper.material.opacity = 0.5;
        scene.add(gridHelper);
        
        // أرضية شفافة لمحاكاة البلاط
        const groundPlane = new THREE.Mesh(
            new THREE.PlaneGeometry(19, 19),
            new THREE.MeshStandardMaterial({ color: 0x2c5e2a, roughness: 0.7, metalness: 0.1, transparent: true, opacity: 0.35 })
        );
        groundPlane.rotation.x = -Math.PI / 2;
        groundPlane.position.y = -1.1;
        groundPlane.receiveShadow = true;
        scene.add(groundPlane);
        
        // حدود زخرفية (أعمدة خشبية)
        const borderMat = new THREE.MeshStandardMaterial({ color: 0xb87c4f, roughness: 0.4 });
        const borderSize = 9.5;
        for (let i = -borderSize; i <= borderSize; i+=1.5) {
            const pillar = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.8, 0.2), borderMat);
            pillar.position.set(i, -0.7, borderSize);
            pillar.castShadow = true;
            scene.add(pillar);
            const pillar2 = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.8, 0.2), borderMat);
            pillar2.position.set(i, -0.7, -borderSize);
            pillar2.castShadow = true;
            scene.add(pillar2);
            const pillar3 = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.8, 0.2), borderMat);
            pillar3.position.set(borderSize, -0.7, i);
            pillar3.castShadow = true;
            scene.add(pillar3);
            const pillar4 = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.8, 0.2), borderMat);
            pillar4.position.set(-borderSize, -0.7, i);
            pillar4.castShadow = true;
            scene.add(pillar4);
        }
        
        // ---------- إعدادات اللعبة (شبكة 15x15 لتناسب المنظر) ----------
        const GRID_SIZE = 15;
        const CELL_SIZE = 1.1;      // حجم الخلية المكانية
        const OFFSET = (GRID_SIZE-1) * CELL_SIZE / 2;
        
        // تحويل إحداثيات الشبكة (x,z) إلى Vector3
        function gridToWorld(x, z) {
            return new THREE.Vector3(x * CELL_SIZE - OFFSET, 0, z * CELL_SIZE - OFFSET);
        }
        
        // --- الثعبان (مجموعة كرات ثلاثية الأبعاد) ---
        let snakeMeshes = [];    // قائمة mesh لكل جزء
        let snakePositions = []; // {x, z} إحداثيات الشبكة
        let direction = 'RIGHT';
        let nextDirection = 'RIGHT';
        let foodPosition = { x: 7, z: 7 };
        let foodMesh = null;
        let score = 0;
        let gameRunning = true;
        
        // نظام الجوع: الثعبان يموت إذا لم يأكل خلال مدة معينة
        let hunger = 100;        // 100 = ممتلئ, 0 = يموت
        let hungerDecayRate = 0.45; // كل تحديث (0.12 ثانية) ينقص بمقدار 0.45 -> ~ 26 ثانية للموت الكامل
        let lastUpdateTime = 0;
        let gameInterval = null;
        
        // سرعة أبطأ (130ms بدلاً من 100)
        const GAME_SPEED_MS = 140;
        
        // تحديث شريط الجوع في واجهة HTML
        const hungerFillDiv = document.getElementById('hungerFill');
        const scoreSpan = document.getElementById('scoreValue');
        const statusDiv = document.getElementById('gameStatus');
        
        function updateHungerUI() {
            let percent = Math.max(0, (hunger / 100) * 100);
            hungerFillDiv.style.width = `${percent}%`;
            if (hunger < 30) {
                hungerFillDiv.style.background = "linear-gradient(90deg, #e34d2c, #ff8c42)";
            } else {
                hungerFillDiv.style.background = "linear-gradient(90deg, #6fbf4c, #f5a623)";
            }
        }
        
        // إنشاء التفاحة (موديل تفاحة 3D)
        function createAppleMesh(x, z) {
            const group = new THREE.Group();
            // جسم التفاحة
            const bodyGeo = new THREE.SphereGeometry(0.38, 24, 24);
            const materialRed = new THREE.MeshStandardMaterial({ color: 0xe34234, roughness: 0.2, emissive: 0x441100 });
            const appleBody = new THREE.Mesh(bodyGeo, materialRed);
            appleBody.castShadow = true;
            group.add(appleBody);
            // الساق
            const stemGeo = new THREE.CylinderGeometry(0.07, 0.09, 0.2);
            const stemMat = new THREE.MeshStandardMaterial({ color: 0x8b5a2b });
            const stem = new THREE.Mesh(stemGeo, stemMat);
            stem.position.set(0, 0.42, 0);
            group.add(stem);
            // ورقة
            const leafGeo = new THREE.BoxGeometry(0.2, 0.05, 0.1);
            const leafMat = new THREE.MeshStandardMaterial({ color: 0x6aab35 });
            const leaf = new THREE.Mesh(leafGeo, leafMat);
            leaf.position.set(0.18, 0.48, 0.05);
            leaf.rotation.z = 0.7;
            group.add(leaf);
            
            const pos = gridToWorld(x, z);
            group.position.copy(pos);
            group.position.y = 0.15;
            scene.add(group);
            return group;
        }
        
        // إعادة إنشاء التفاحة في موقع عشوائي فارغ
        function respawnFood() {
            if (!gameRunning) return;
            const occupied = new Set(snakePositions.map(p => `${p.x},${p.z}`));
            if (occupied.size >= GRID_SIZE * GRID_SIZE) {
                gameWin();
                return;
            }
            let freeCells = [];
            for (let i = 0; i < GRID_SIZE; i++) {
                for (let j = 0; j < GRID_SIZE; j++) {
                    if (!occupied.has(`${i},${j}`)) freeCells.push({ x: i, z: j });
                }
            }
            if (freeCells.length === 0) {
                gameWin();
                return;
            }
            const rand = Math.floor(Math.random() * freeCells.length);
            const newPos = freeCells[rand];
            foodPosition = newPos;
            if (foodMesh) scene.remove(foodMesh);
            foodMesh = createAppleMesh(foodPosition.x, foodPosition.z);
        }
        
        // إنشاء الثعبان (أجزاء كروية)
        function rebuildSnakeVisuals() {
            // إزالة القديم
            snakeMeshes.forEach(mesh => scene.remove(mesh));
            snakeMeshes = [];
            for (let i = 0; i < snakePositions.length; i++) {
                const seg = snakePositions[i];
                const pos = gridToWorld(seg.x, seg.z);
                const sphereGeo = new THREE.SphereGeometry(0.48, 32, 32);
                let color;
                if (i === 0) color = 0x7ec850;
                else color = 0x4fa639;
                const material = new THREE.MeshStandardMaterial({ color: color, roughness: 0.3, metalness: 0.1 });
                const sphere = new THREE.Mesh(sphereGeo, material);
                sphere.position.copy(pos);
                sphere.position.y = 0.2;
                sphere.castShadow = true;
                sphere.receiveShadow = false;
                scene.add(sphere);
                snakeMeshes.push(sphere);
                // عيون الرأس
                if (i === 0) {
                    const eyeMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
                    const leftEye = new THREE.Mesh(new THREE.SphereGeometry(0.12, 16, 16), eyeMat);
                    const rightEye = new THREE.Mesh(new THREE.SphereGeometry(0.12, 16, 16), eyeMat);
                    leftEye.position.set(-0.25, 0.25, 0.48);
                    rightEye.position.set(0.25, 0.25, 0.48);
                    sphere.add(leftEye);
                    sphere.add(rightEye);
                    const pupilMat = new THREE.MeshStandardMaterial({ color: 0x000000 });
                    const leftPupil = new THREE.Mesh(new THREE.SphereGeometry(0.07, 16, 16), pupilMat);
                    const rightPupil = new THREE.Mesh(new THREE.SphereGeometry(0.07, 16, 16), pupilMat);
                    leftPupil.position.set(-0.25, 0.2, 0.55);
                    rightPupil.position.set(0.25, 0.2, 0.55);
                    sphere.add(leftPupil);
                    sphere.add(rightPupil);
                }
            }
        }
        
        // إنهاء اللعبة (موت جوع أو اصطدام ذاتي - لكن اصطدام ذاتي مطلوب)
        function gameOver(reason = 'جوع') {
            if (!gameRunning) return;
            gameRunning = false;
            if (gameInterval) clearInterval(gameInterval);
            gameInterval = null;
            statusDiv.innerText = `💀 مات من ${reason} 💀`;
            statusDiv.style.background = "rgba(100,30,10,0.9)";
        }
        
        function gameWin() {
            if (!gameRunning) return;
            gameRunning = false;
            if (gameInterval) clearInterval(gameInterval);
            gameInterval = null;
            statusDiv.innerText = '🏆 فوز! ملأ السلم 🏆';
            statusDiv.style.background = "rgba(180,130,30,0.9)";
        }
        
        // الحركة الرئيسية
        function moveSnake() {
            if (!gameRunning) return;
            
            // خفض الجوع أولاً
            hunger -= hungerDecayRate;
            updateHungerUI();
            if (hunger <= 0) {
                gameOver("الجوع");
                return;
            }
            
            // تحديث الاتجاه (يمنع الرجوع)
            let newDir = nextDirection;
            if ((newDir === 'RIGHT' && direction === 'LEFT') ||
                (newDir === 'LEFT' && direction === 'RIGHT') ||
                (newDir === 'UP' && direction === 'DOWN') ||
                (newDir === 'DOWN' && direction === 'UP')) {
                newDir = direction;
            }
            direction = newDir;
            
            let head = snakePositions[0];
            let newHead = { ...head };
            switch(direction) {
                case 'RIGHT': newHead.x += 1; break;
                case 'LEFT': newHead.x -= 1; break;
                case 'UP': newHead.z -= 1; break;
                case 'DOWN': newHead.z += 1; break;
            }
            
            // ** اختراق الجدران **
            if (newHead.x < 0) newHead.x = GRID_SIZE - 1;
            if (newHead.x >= GRID_SIZE) newHead.x = 0;
            if (newHead.z < 0) newHead.z = GRID_SIZE - 1;
            if (newHead.z >= GRID_SIZE) newHead.z = 0;
            
            const willEat = (newHead.x === foodPosition.x && newHead.z === foodPosition.z);
            
            // تنفيذ الحركة
            snakePositions.unshift(newHead);
            if (!willEat) {
                snakePositions.pop();
            } else {
                // أكل التفاحة: زيادة النتيجة و تجديد الجوع بالكامل وزيادة التفاح
                score++;
                scoreSpan.innerText = score;
                hunger = 100;
                updateHungerUI();
                respawnFood();
                // لا نزيل الجزء الخلفي في حالة الأكل -> يزيد الطول
            }
            
            // التحقق من الاصطدام بالذات (بعد الحركة)
            const headPos = snakePositions[0];
            for (let i = 1; i < snakePositions.length; i++) {
                if (snakePositions[i].x === headPos.x && snakePositions[i].z === headPos.z) {
                    gameOver("الاصطدام بنفسه");
                    return;
                }
            }
            
            // إعادة رسم المجسمات
            rebuildSnakeVisuals();
            // إضافة تأثير بسيط للكاميرا
            updateCameraAngle();
        }
        
        // حركة كاميرا خفيفة ديناميكية
        let timeOffset = 0;
        function updateCameraAngle() {
            // حركة بسيطة خفيفة حسب اتجاه الثعبان لإحساس 3D
            if (!gameRunning) return;
            const targetX = 16 + Math.sin(Date.now() * 0.002) * 0.5;
            const targetZ = 14 + Math.cos(Date.now() * 0.0015) * 0.4;
            camera.position.x += (targetX - camera.position.x) * 0.03;
            camera.position.z += (targetZ - camera.position.z) * 0.03;
            camera.lookAt(0, 0, 0);
        }
        
        // إعادة ضبط اللعبة
        function resetGame() {
            if (gameInterval) clearInterval(gameInterval);
            // إزالة المجسمات القديمة
            snakeMeshes.forEach(m => scene.remove(m));
            if (foodMesh) scene.remove(foodMesh);
            snakeMeshes = [];
            // إعداد الثعبان الأولي
            snakePositions = [
                { x: 7, z: 7 },
                { x: 6, z: 7 },
                { x: 5, z: 7 },
                { x: 4, z: 7 }
            ];
            direction = 'RIGHT';
            nextDirection = 'RIGHT';
            score = 0;
            scoreSpan.innerText = "0";
            hunger = 100;
            updateHungerUI();
            gameRunning = true;
            statusDiv.innerText = "🌟 نشط";
            statusDiv.style.background = "rgba(0,0,0,0.7)";
            
            // توليد تفاحة بعيدة
            const occupiedSet = new Set(snakePositions.map(p => `${p.x},${p.z}`));
            let free = [];
            for (let i=0; i<GRID_SIZE; i++)
                for(let j=0; j<GRID_SIZE; j++)
                    if(!occupiedSet.has(`${i},${j}`)) free.push({x:i, z:j});
            if(free.length) foodPosition = free[Math.floor(Math.random() * free.length)];
            else foodPosition = {x:10, z:10};
            
            if (foodMesh) scene.remove(foodMesh);
            foodMesh = createAppleMesh(foodPosition.x, foodPosition.z);
            rebuildSnakeVisuals();
            
            gameInterval = setInterval(() => {
                moveSnake();
                if (!gameRunning) {
                    // لا تفعل شيء إضافي
                }
            }, GAME_SPEED_MS);
        }
        
        // التحكم بالأسهم
        window.addEventListener('keydown', (e) => {
            if (!gameRunning) return;
            const key = e.key;
            e.preventDefault();
            switch(key) {
                case 'ArrowUp': nextDirection = 'UP'; break;
                case 'ArrowDown': nextDirection = 'DOWN'; break;
                case 'ArrowLeft': nextDirection = 'LEFT'; break;
                case 'ArrowRight': nextDirection = 'RIGHT'; break;
                default: break;
            }
        });
        
        // منع تمرير الصفحة بالأسهم
        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowUp' || e.key === 'ArrowDown' || e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
                e.preventDefault();
            }
        });
        
        document.getElementById('resetButton').addEventListener('click', () => {
            resetGame();
        });
        
        // إضافة مؤثرات زخرفية (جزيئات خفيفة)
        const starField = new THREE.Points(
            new THREE.BufferGeometry(),
            new THREE.PointsMaterial({ color: 0xffdd99, size: 0.08 })
        );
        const starCount = 600;
        const starPositions = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount; i++) {
            starPositions[i*3] = (Math.random() - 0.5) * 200;
            starPositions[i*3+1] = (Math.random() - 0.5) * 40 + 8;
            starPositions[i*3+2] = (Math.random() - 0.5) * 120 - 50;
        }
        starField.geometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        scene.add(starField);
        
        // حلقة التصيير
        function animate() {
            requestAnimationFrame(animate);
            // تحديث حركة عائمة للتفاحة
            if (foodMesh && gameRunning) {
                foodMesh.position.y = 0.15 + Math.sin(Date.now() * 0.008) * 0.05;
            }
            // تحريك الكاميرا برفق حول المشهد (لمسة سينمائية)
            if (gameRunning) {
                // دوران خفيف جداً للكاميرا حول المحور Y للحصول على إحساس 3D رائع
                const angle = Date.now() * 0.0005;
                // لكن نحافظ على زاوية مائلة، فقط لمسة ديناميكية
                const offsetX = Math.sin(angle) * 1.2;
                const offsetZ = Math.cos(angle * 0.7) * 0.8;
                camera.position.x += (16 + offsetX - camera.position.x) * 0.02;
                camera.position.z += (14 + offsetZ - camera.position.z) * 0.02;
                camera.lookAt(0, 0.5, 0);
            } else {
                // عند الموت نثبت الكاميرا قليلاً
                camera.lookAt(0, 0, 0);
            }
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }
        
        animate();
        resetGame();
        
        // استجابة لحجم الشاشة
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        // تلميحات للمستخدم
        console.log('اللعبة 3D تعمل | اختراق الجدران | الجوع يقتل إذا لم تأكل التفاح');
    </script>
</body>
</html>

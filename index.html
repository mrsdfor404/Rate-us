<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Hungry Snake </title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', 'Tahoma', 'Cairo', sans-serif;
        }
        /* UI Overlay */
        .ui {
            position: absolute;
            top: 20px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            box-sizing: border-box;
            z-index: 10;
            pointer-events: none;
        }
        .panel {
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(10px);
            padding: 8px 20px;
            border-radius: 50px;
            color: #ffd966;
            font-weight: bold;
            font-size: 1.2rem;
            border-left: 3px solid #ffaa33;
            border-right: 3px solid #ffaa33;
            pointer-events: auto;
            font-family: monospace;
        }
        .panel span {
            color: white;
            font-size: 1.6rem;
            margin-left: 8px;
            background: #2c2e1e;
            padding: 0px 12px;
            border-radius: 40px;
        }
        .restart-btn {
            background: #ff7b2c;
            border: none;
            font-size: 1.1rem;
            font-weight: bold;
            padding: 6px 20px;
            border-radius: 40px;
            color: #2d1b0a;
            cursor: pointer;
            font-family: inherit;
            box-shadow: 0 4px 0 #a13f12;
            transition: 0.07s linear;
            pointer-events: auto;
        }
        .restart-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #a13f12;
        }
        .status-box {
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(8px);
            padding: 5px 16px;
            border-radius: 40px;
            color: #ffdca8;
            font-weight: bold;
            font-size: 0.9rem;
            pointer-events: auto;
        }
        .hunger-container {
            position: absolute;
            bottom: 25px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.6);
            border-radius: 20px;
            height: 18px;
            backdrop-filter: blur(5px);
            z-index: 10;
            pointer-events: none;
            border: 1px solid #f3b35e;
        }
        .hunger-fill {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #6fbf4c, #f5a623);
            border-radius: 20px;
            transition: width 0.2s linear;
        }
        .hunger-label {
            position: absolute;
            bottom: 48px;
            left: 20px;
            background: rgba(0,0,0,0.6);
            padding: 2px 12px;
            border-radius: 20px;
            color: #ffefb9;
            font-size: 0.75rem;
            font-weight: bold;
            pointer-events: none;
            font-family: monospace;
        }
        .lang-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #2c3e2bdd;
            backdrop-filter: blur(8px);
            border: none;
            padding: 6px 14px;
            border-radius: 30px;
            color: #f9e0a0;
            font-weight: bold;
            cursor: pointer;
            z-index: 20;
            font-family: inherit;
            font-size: 0.8rem;
            pointer-events: auto;
        }
        @media (max-width: 700px) {
            .panel { font-size: 0.9rem; padding: 5px 12px; }
            .panel span { font-size: 1.2rem; }
            .restart-btn { padding: 4px 12px; font-size: 0.9rem; }
            .status-box { font-size: 0.7rem; }
        }
    </style>
</head>
<body>
    <button class="lang-toggle" id="langBtn">🇸🇦 العربية</button>
    <div class="ui">
        <div class="panel" id="scorePanel">🍎 <span id="scoreValue">0</span></div>
        <button class="restart-btn" id="resetButton">🐍 New Game</button>
        <div class="status-box" id="gameStatus">✨ Active</div>
    </div>
    <div class="hunger-container">
        <div class="hunger-fill" id="hungerFill"></div>
    </div>
    <div class="hunger-label" id="hungerLabel">Hunger: decays over time | Eat apples to refill</div>

    <!-- Import Three.js core and addons -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        
        // ---------- Setup Scene (Fixed Camera) ----------
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x071a2b);
        scene.fog = new THREE.FogExp2(0x071a2b, 0.006);
        
        // Fixed camera: Isometric view, stable
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(16, 13, 16);
        camera.lookAt(0, 0, 0);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);
        
        // Lighting for realistic snake
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        const mainLight = new THREE.DirectionalLight(0xfff5c0, 1.3);
        mainLight.position.set(8, 12, 5);
        mainLight.castShadow = true;
        mainLight.receiveShadow = true;
        mainLight.shadow.mapSize.width = 1024;
        mainLight.shadow.mapSize.height = 1024;
        scene.add(mainLight);
        const fillLight = new THREE.PointLight(0x88aaff, 0.45);
        fillLight.position.set(-4, 5, 4);
        scene.add(fillLight);
        const rimLight = new THREE.PointLight(0xffaa66, 0.5);
        rimLight.position.set(3, 4, -6);
        scene.add(rimLight);
        
        // Ground and decorative elements
        const gridHelper = new THREE.GridHelper(26, 20, 0xaa9977, 0x7c6e4e);
        gridHelper.position.y = -1.2;
        gridHelper.material.transparent = true;
        gridHelper.material.opacity = 0.4;
        scene.add(gridHelper);
        
        const groundPlane = new THREE.Mesh(
            new THREE.PlaneGeometry(18.5, 18.5),
            new THREE.MeshStandardMaterial({ color: 0x2c5e2a, roughness: 0.7, metalness: 0.1, transparent: true, opacity: 0.3 })
        );
        groundPlane.rotation.x = -Math.PI / 2;
        groundPlane.position.y = -1.1;
        groundPlane.receiveShadow = true;
        scene.add(groundPlane);
        
        // Decorative wooden borders
        const borderMat = new THREE.MeshStandardMaterial({ color: 0xb87c4f, roughness: 0.4 });
        const borderSize = 9.2;
        for (let i = -borderSize; i <= borderSize; i+=1.6) {
            const pillar = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.8, 0.25), borderMat);
            pillar.position.set(i, -0.7, borderSize);
            pillar.castShadow = true;
            scene.add(pillar);
            const pillar2 = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.8, 0.25), borderMat);
            pillar2.position.set(i, -0.7, -borderSize);
            pillar2.castShadow = true;
            scene.add(pillar2);
            const pillar3 = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.8, 0.25), borderMat);
            pillar3.position.set(borderSize, -0.7, i);
            pillar3.castShadow = true;
            scene.add(pillar3);
            const pillar4 = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.8, 0.25), borderMat);
            pillar4.position.set(-borderSize, -0.7, i);
            pillar4.castShadow = true;
            scene.add(pillar4);
        }
        
        // ---------- Game Configuration ----------
        const GRID_SIZE = 15;
        const CELL_SIZE = 1.12;
        const OFFSET = (GRID_SIZE-1) * CELL_SIZE / 2;
        
        function gridToWorld(x, z) {
            return new THREE.Vector3(x * CELL_SIZE - OFFSET, 0, z * CELL_SIZE - OFFSET);
        }
        
        // Realistic snake body: each segment is a scaled sphere with smooth gradient
        let snakeSegments = []; // Array of THREE.Mesh
        let snakePositions = []; // {x, z} grid positions
        let direction = 'RIGHT';
        let nextDirection = 'RIGHT';
        let foodPosition = { x: 10, z: 8 };
        let foodMesh = null;
        let score = 0;
        let gameRunning = true;
        
        // Hunger system
        let hunger = 100;
        const HUNGER_DECAY = 0.42; // per move (~140ms)
        let gameInterval = null;
        const GAME_SPEED = 145; // ms (slower & smooth)
        
        // DOM elements
        const scoreSpan = document.getElementById('scoreValue');
        const statusDiv = document.getElementById('gameStatus');
        const hungerFill = document.getElementById('hungerFill');
        const hungerLabelSpan = document.getElementById('hungerLabel');
        const scorePanelSpan = document.getElementById('scorePanel');
        const resetBtn = document.getElementById('resetButton');
        const langBtn = document.getElementById('langBtn');
        
        // --- Language strings ---
        let currentLang = 'en'; // 'en' or 'ar'
        const strings = {
            en: {
                score: '🍎 Apples',
                newGame: '🐍 New Game',
                active: '✨ Active',
                deadHunger: '💀 Died of Hunger',
                deadCollision: '💀 Hit Itself',
                win: '🏆 Victory! Full Ladder',
                hungerLabel: 'Hunger: decays over time | Eat apples to refill',
                resetConfirm: ''
            },
            ar: {
                score: '🍎 التفاحات',
                newGame: '🐍 سلم جديد',
                active: '🌟 نشط',
                deadHunger: '💀 مات من الجوع',
                deadCollision: '💀 اصطدم بنفسه',
                win: '🏆 فوز! ملأ السلم',
                hungerLabel: 'الجوع: ينقص مع الوقت | أكل التفاح يعيد الشبع'
            }
        };
        
        function updateLanguage() {
            const t = strings[currentLang];
            scorePanelSpan.innerHTML = `${t.score} <span id="scoreValue">${score}</span>`;
            resetBtn.innerHTML = t.newGame;
            if (gameRunning) statusDiv.innerText = t.active;
            else if (statusDiv.innerText.includes('Hunger') || statusDiv.innerText.includes('جوع')) statusDiv.innerText = t.deadHunger;
            else if (statusDiv.innerText.includes('Hit') || statusDiv.innerText.includes('اصطدم')) statusDiv.innerText = t.deadCollision;
            else if (statusDiv.innerText.includes('Victory') || statusDiv.innerText.includes('فوز')) statusDiv.innerText = t.win;
            hungerLabelSpan.innerText = t.hungerLabel;
            // Force score span refresh
            const scoreSpanElem = document.getElementById('scoreValue');
            if (scoreSpanElem) scoreSpanElem.innerText = score;
        }
        
        langBtn.addEventListener('click', () => {
            currentLang = currentLang === 'en' ? 'ar' : 'en';
            updateLanguage();
        });
        
        // Create realistic apple mesh
        function createAppleMesh(x, z) {
            const group = new THREE.Group();
            const bodyGeo = new THREE.SphereGeometry(0.42, 32, 32);
            const materialRed = new THREE.MeshStandardMaterial({ color: 0xdc4c3a, roughness: 0.25, emissive: 0x331100 });
            const appleBody = new THREE.Mesh(bodyGeo, materialRed);
            appleBody.castShadow = true;
            group.add(appleBody);
            const stemGeo = new THREE.CylinderGeometry(0.08, 0.1, 0.22);
            const stemMat = new THREE.MeshStandardMaterial({ color: 0x8b5a2b });
            const stem = new THREE.Mesh(stemGeo, stemMat);
            stem.position.set(0, 0.48, 0);
            group.add(stem);
            const leafGeo = new THREE.BoxGeometry(0.22, 0.06, 0.12);
            const leafMat = new THREE.MeshStandardMaterial({ color: 0x6aab35 });
            const leaf = new THREE.Mesh(leafGeo, leafMat);
            leaf.position.set(0.2, 0.52, 0.06);
            leaf.rotation.z = 0.65;
            group.add(leaf);
            const pos = gridToWorld(x, z);
            group.position.copy(pos);
            group.position.y = 0.2;
            scene.add(group);
            return group;
        }
        
        // Create realistic snake segment with scales effect
        function createSnakeSegment(color, isHead = false, index = 0) {
            const geometry = new THREE.SphereGeometry(0.52, 36, 36);
            const material = new THREE.MeshStandardMaterial({ color: color, roughness: 0.28, metalness: 0.15 });
            const sphere = new THREE.Mesh(geometry, material);
            sphere.castShadow = true;
            sphere.receiveShadow = false;
            if (isHead) {
                // Add eyes and tongue for realism
                const eyeMatWhite = new THREE.MeshStandardMaterial({ color: 0xffffff });
                const eyeMatBlack = new THREE.MeshStandardMaterial({ color: 0x000000 });
                const leftEye = new THREE.Mesh(new THREE.SphereGeometry(0.12, 24, 24), eyeMatWhite);
                const rightEye = new THREE.Mesh(new THREE.SphereGeometry(0.12, 24, 24), eyeMatWhite);
                leftEye.position.set(-0.28, 0.28, 0.55);
                rightEye.position.set(0.28, 0.28, 0.55);
                sphere.add(leftEye);
                sphere.add(rightEye);
                const leftPupil = new THREE.Mesh(new THREE.SphereGeometry(0.07, 24, 24), eyeMatBlack);
                const rightPupil = new THREE.Mesh(new THREE.SphereGeometry(0.07, 24, 24), eyeMatBlack);
                leftPupil.position.set(-0.28, 0.24, 0.64);
                rightPupil.position.set(0.28, 0.24, 0.64);
                sphere.add(leftPupil);
                sphere.add(rightPupil);
                // tiny tongue
                const tongueMat = new THREE.MeshStandardMaterial({ color: 0xdd5544 });
                const tongue = new THREE.Mesh(new THREE.ConeGeometry(0.08, 0.2, 6), tongueMat);
                tongue.position.set(0, 0.1, 0.72);
                tongue.rotation.x = 0.3;
                sphere.add(tongue);
            } else {
                // add little bumps for scales effect
                const bumpMat = new THREE.MeshStandardMaterial({ color: 0x3f8a2a });
                for (let i = -1; i <= 1; i++) {
                    const bump = new THREE.Mesh(new THREE.SphereGeometry(0.09, 8, 8), bumpMat);
                    bump.position.set(i * 0.35, 0.2, 0.52);
                    sphere.add(bump);
                    const bump2 = new THREE.Mesh(new THREE.SphereGeometry(0.09, 8, 8), bumpMat);
                    bump2.position.set(i * 0.35, -0.25, 0.52);
                    sphere.add(bump2);
                }
            }
            return sphere;
        }
        
        function rebuildSnakeVisuals() {
            // remove old
            snakeSegments.forEach(seg => scene.remove(seg));
            snakeSegments = [];
            for (let i = 0; i < snakePositions.length; i++) {
                const pos = snakePositions[i];
                const worldPos = gridToWorld(pos.x, pos.z);
                let color;
                if (i === 0) color = 0x7ec850;
                else {
                    const t = i / snakePositions.length;
                    color = 0x5ca832;
                }
                const isHead = (i === 0);
                const segment = createSnakeSegment(color, isHead, i);
                segment.position.copy(worldPos);
                segment.position.y = 0.23;
                scene.add(segment);
                snakeSegments.push(segment);
            }
        }
        
        function respawnFood() {
            if (!gameRunning) return;
            const occupied = new Set(snakePositions.map(p => `${p.x},${p.z}`));
            if (occupied.size >= GRID_SIZE * GRID_SIZE) {
                gameWin();
                return;
            }
            let free = [];
            for (let i = 0; i < GRID_SIZE; i++) {
                for (let j = 0; j < GRID_SIZE; j++) {
                    if (!occupied.has(`${i},${j}`)) free.push({ x: i, z: j });
                }
            }
            if (free.length === 0) { gameWin(); return; }
            const rand = Math.floor(Math.random() * free.length);
            foodPosition = free[rand];
            if (foodMesh) scene.remove(foodMesh);
            foodMesh = createAppleMesh(foodPosition.x, foodPosition.z);
        }
        
        function gameOver(reason) {
            if (!gameRunning) return;
            gameRunning = false;
            if (gameInterval) clearInterval(gameInterval);
            gameInterval = null;
            const t = strings[currentLang];
            if (reason === 'hunger') statusDiv.innerText = t.deadHunger;
            else statusDiv.innerText = t.deadCollision;
            statusDiv.style.background = "rgba(100,30,10,0.9)";
        }
        
        function gameWin() {
            if (!gameRunning) return;
            gameRunning = false;
            if (gameInterval) clearInterval(gameInterval);
            gameInterval = null;
            const t = strings[currentLang];
            statusDiv.innerText = t.win;
            statusDiv.style.background = "rgba(180,130,30,0.9)";
        }
        
        function moveSnake() {
            if (!gameRunning) return;
            
            // Hunger decay
            hunger -= HUNGER_DECAY;
            const hungerPercent = Math.max(0, (hunger / 100) * 100);
            hungerFill.style.width = `${hungerPercent}%`;
            if (hunger <= 0) {
                gameOver('hunger');
                return;
            }
            if (hunger < 30) hungerFill.style.background = "linear-gradient(90deg, #e34d2c, #ff8c42)";
            else hungerFill.style.background = "linear-gradient(90deg, #6fbf4c, #f5a623)";
            
            // direction handling
            let newDir = nextDirection;
            if ((newDir === 'RIGHT' && direction === 'LEFT') ||
                (newDir === 'LEFT' && direction === 'RIGHT') ||
                (newDir === 'UP' && direction === 'DOWN') ||
                (newDir === 'DOWN' && direction === 'UP')) {
                newDir = direction;
            }
            direction = newDir;
            
            let head = snakePositions[0];
            let newHead = { ...head };
            switch(direction) {
                case 'RIGHT': newHead.x += 1; break;
                case 'LEFT': newHead.x -= 1; break;
                case 'UP': newHead.z -= 1; break;
                case 'DOWN': newHead.z += 1; break;
            }
            
            // WALL CLIPPING (wrap around)
            if (newHead.x < 0) newHead.x = GRID_SIZE - 1;
            if (newHead.x >= GRID_SIZE) newHead.x = 0;
            if (newHead.z < 0) newHead.z = GRID_SIZE - 1;
            if (newHead.z >= GRID_SIZE) newHead.z = 0;
            
            const willEat = (newHead.x === foodPosition.x && newHead.z === foodPosition.z);
            
            snakePositions.unshift(newHead);
            if (!willEat) {
                snakePositions.pop();
            } else {
                score++;
                scoreSpan.innerText = score;
                // update language-aware score panel
                const t = strings[currentLang];
                scorePanelSpan.innerHTML = `${t.score} <span id="scoreValue">${score}</span>`;
                hunger = 100;
                hungerFill.style.width = `100%`;
                respawnFood();
            }
            
            // self-collision check
            const headPos = snakePositions[0];
            for (let i = 1; i < snakePositions.length; i++) {
                if (snakePositions[i].x === headPos.x && snakePositions[i].z === headPos.z) {
                    gameOver('collision');
                    return;
                }
            }
            
            rebuildSnakeVisuals();
        }
        
        function resetGame() {
            if (gameInterval) clearInterval(gameInterval);
            snakeSegments.forEach(seg => scene.remove(seg));
            if (foodMesh) scene.remove(foodMesh);
            // init snake
            snakePositions = [
                { x: 7, z: 7 },
                { x: 6, z: 7 },
                { x: 5, z: 7 },
                { x: 4, z: 7 },
                { x: 3, z: 7 }
            ];
            direction = 'RIGHT';
            nextDirection = 'RIGHT';
            score = 0;
            scoreSpan.innerText = "0";
            hunger = 100;
            hungerFill.style.width = "100%";
            gameRunning = true;
            const t = strings[currentLang];
            statusDiv.innerText = t.active;
            statusDiv.style.background = "rgba(0,0,0,0.75)";
            scorePanelSpan.innerHTML = `${t.score} <span id="scoreValue">0</span>`;
            
            // random food away from snake
            const occupiedSet = new Set(snakePositions.map(p => `${p.x},${p.z}`));
            let freeCells = [];
            for (let i = 0; i < GRID_SIZE; i++) {
                for (let j = 0; j < GRID_SIZE; j++) {
                    if (!occupiedSet.has(`${i},${j}`)) freeCells.push({ x: i, z: j });
                }
            }
            if (freeCells.length) foodPosition = freeCells[Math.floor(Math.random() * freeCells.length)];
            else foodPosition = { x: 10, z: 10 };
            if (foodMesh) scene.remove(foodMesh);
            foodMesh = createAppleMesh(foodPosition.x, foodPosition.z);
            rebuildSnakeVisuals();
            
            gameInterval = setInterval(() => {
                moveSnake();
                if (!gameRunning && gameInterval) {
                    // nothing extra
                }
            }, GAME_SPEED);
        }
        
        // Keyboard controls
        window.addEventListener('keydown', (e) => {
            if (!gameRunning) return;
            const key = e.key;
            if (key === 'ArrowUp' || key === 'ArrowDown' || key === 'ArrowLeft' || key === 'ArrowRight') {
                e.preventDefault();
            }
            switch(key) {
                case 'ArrowUp': nextDirection = 'UP'; break;
                case 'ArrowDown': nextDirection = 'DOWN'; break;
                case 'ArrowLeft': nextDirection = 'LEFT'; break;
                case 'ArrowRight': nextDirection = 'RIGHT'; break;
                default: break;
            }
        });
        
        resetBtn.addEventListener('click', () => resetGame());
        
        // Star particle effect for ambiance
        const starField = new THREE.Points(
            new THREE.BufferGeometry(),
            new THREE.PointsMaterial({ color: 0xffdd99, size: 0.07 })
        );
        const starCount = 800;
        const starPositionsArr = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount; i++) {
            starPositionsArr[i*3] = (Math.random() - 0.5) * 200;
            starPositionsArr[i*3+1] = (Math.random() - 0.5) * 35 + 6;
            starPositionsArr[i*3+2] = (Math.random() - 0.5) * 120 - 50;
        }
        starField.geometry.setAttribute('position', new THREE.BufferAttribute(starPositionsArr, 3));
        scene.add(starField);
        
        // Animation loop & floating apple effect
        function animate() {
            requestAnimationFrame(animate);
            if (foodMesh && gameRunning) {
                foodMesh.position.y = 0.2 + Math.sin(Date.now() * 0.007) * 0.07;
            }
            // subtle idle sway for snake head (realism)
            if (gameRunning && snakeSegments.length > 0) {
                const headMesh = snakeSegments[0];
                if (headMesh) {
                    headMesh.position.y = 0.23 + Math.sin(Date.now() * 0.012) * 0.008;
                }
            }
            renderer.render(scene, camera);
        }
        animate();
        resetGame();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        // initial language sync
        updateLanguage();
    </script>
</body>
</html>

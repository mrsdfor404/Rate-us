<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>سلم التفاحة 🍎 | لعبة الأفعى الكلاسيكية</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(145deg, #1a472a 0%, #0e2a1a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Tahoma', 'Cairo', system-ui, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .game-container {
            background: #2b5e2f;
            padding: 20px 25px 25px 25px;
            border-radius: 70px 70px 50px 50px;
            box-shadow: 0 25px 35px rgba(0,0,0,0.4), inset 0 1px 4px rgba(255,255,200,0.6);
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 24px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            background-color: #fef7e0;
            cursor: pointer;
        }

        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-top: 18px;
            background: #f9eec1;
            padding: 12px 25px;
            border-radius: 60px;
            box-shadow: inset 0 1px 5px rgba(98, 49, 10, 0.2), 0 5px 10px rgba(0,0,0,0.2);
        }

        .score-box {
            background: #2c2e1e;
            color: #fdd67a;
            padding: 6px 20px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1.6rem;
            font-family: monospace;
            letter-spacing: 2px;
            box-shadow: inset 0 0 5px #ffdd99, 0 3px 0 #3a2a0a;
        }

        .score-label {
            font-weight: bold;
            color: #4a2a12;
            font-size: 1.1rem;
            background: #ffecb3;
            padding: 5px 12px;
            border-radius: 30px;
        }

        .restart-btn {
            background: #ff914d;
            border: none;
            font-size: 1.2rem;
            font-weight: bold;
            padding: 6px 18px;
            border-radius: 40px;
            color: #2d1b0a;
            cursor: pointer;
            transition: all 0.1s ease;
            font-family: inherit;
            box-shadow: 0 4px 0 #b1451a;
        }

        .restart-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #b1451a;
        }

        .status {
            background: #3c280e;
            padding: 5px 14px;
            border-radius: 50px;
            color: #ffe0a3;
            font-weight: bold;
            font-size: 1rem;
        }

        .controls-tip {
            margin-top: 12px;
            text-align: center;
            font-size: 0.85rem;
            background: #d9c48b80;
            backdrop-filter: blur(4px);
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
            padding: 5px 15px;
            border-radius: 60px;
            color: #1f2f0a;
            font-weight: bold;
        }

        @media (max-width: 550px) {
            .game-container {
                padding: 15px 18px 20px 18px;
            }
            .score-box {
                font-size: 1.2rem;
                padding: 4px 14px;
            }
            .restart-btn {
                font-size: 1rem;
                padding: 4px 14px;
            }
        }
    </style>
</head>
<body>
<div>
    <div class="game-container">
        <canvas id="gameCanvas" width="500" height="500"></canvas>
        <div class="info-panel">
            <span class="score-label">🍎 التفاحات</span>
            <span class="score-box" id="scoreValue">0</span>
            <button class="restart-btn" id="resetButton">🐍 سلم جديد</button>
            <span class="status" id="gameStatus">🎮 العب</span>
        </div>
        <div class="controls-tip">
            ⬆️ ⬇️ ⬅️ ➡️  الأسهم للتحكم | كل تفاحة تطوّلك 🍎
        </div>
    </div>
</div>

<script>
    (function(){
        // ---------- إعدادات اللعبة ----------
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreSpan = document.getElementById('scoreValue');
        const statusDiv = document.getElementById('gameStatus');
        
        // أبعاد الشبكة (سلالم كلاسيكية 20x20)
        const GRID_SIZE = 20;      // 20x20 خلية
        const CELL_SIZE = canvas.width / GRID_SIZE; // 25px
        
        // متغيرات الثعبان
        let snake = [];     // مصفوفة قطع [{x, y}]
        let direction = 'RIGHT';    // الاتجاه الحالي
        let nextDirection = 'RIGHT';
        let food = { x: 12, y: 10 };
        let score = 0;
        let gameLoop = null;
        let gameRunning = true;
        let gameSpeed = 120;   // ميلي ثانية (سلس وليس سريع جداً)
        
        // --- دوال مساعدة ---
        function randomInt(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }
        
        // توليد تفاحة جديدة في مكان فارغ
        function generateRandomFood() {
            const totalCells = GRID_SIZE * GRID_SIZE;
            if (snake.length >= totalCells) {
                // فوز ساحق! (إذا ملأ الشاشة)
                gameWin();
                return false;
            }
            
            // تجميع الخلايا الفارغة
            const snakeSet = new Set(snake.map(segment => `${segment.x},${segment.y}`));
            if (snakeSet.size === totalCells) {
                gameWin();
                return false;
            }
            
            let newFoodPos = null;
            let attempts = 0;
            while (!newFoodPos && attempts < 2000) {
                const randX = randomInt(0, GRID_SIZE-1);
                const randY = randomInt(0, GRID_SIZE-1);
                if (!snakeSet.has(`${randX},${randY}`)) {
                    newFoodPos = { x: randX, y: randY };
                    break;
                }
                attempts++;
            }
            // لو فيه عناد (نادر) ندور بشكل تسلسلي
            if (!newFoodPos) {
                for (let i = 0; i < GRID_SIZE; i++) {
                    for (let j = 0; j < GRID_SIZE; j++) {
                        if (!snakeSet.has(`${i},${j}`)) {
                            newFoodPos = { x: i, y: j };
                            break;
                        }
                    }
                    if (newFoodPos) break;
                }
            }
            if (newFoodPos) {
                food = newFoodPos;
                return true;
            } else {
                gameWin();
                return false;
            }
        }
        
        // إنهاء اللعبة بالفوز
        function gameWin() {
            if (!gameRunning) return;
            gameRunning = false;
            if (gameLoop) clearInterval(gameLoop);
            gameLoop = null;
            statusDiv.innerText = '🏆 فوز! سلم كامل 🏆';
            statusDiv.style.background = "#d4af37";
            statusDiv.style.color = "#1f3a0a";
        }
        
        // إنهاء اللعبة بالاصطدام
        function gameOver() {
            if (!gameRunning) return;
            gameRunning = false;
            if (gameLoop) clearInterval(gameLoop);
            gameLoop = null;
            statusDiv.innerText = '💀 انتهت اللعبة 💀';
            statusDiv.style.background = "#a13e2d";
            statusDiv.style.color = "#ffecb3";
        }
        
        // إعادة ضبط كل شيء
        function resetGame() {
            // إيقاف اللوب القديم
            if (gameLoop) {
                clearInterval(gameLoop);
                gameLoop = null;
            }
            // الثعبان الافتراضي (3 خلايا)
            snake = [
                { x: 10, y: 10 },
                { x: 9, y: 10 },
                { x: 8, y: 10 }
            ];
            direction = 'RIGHT';
            nextDirection = 'RIGHT';
            score = 0;
            scoreSpan.innerText = "0";
            gameRunning = true;
            statusDiv.innerText = "🎮 العب";
            statusDiv.style.background = "#3c280e";
            statusDiv.style.color = "#ffe0a3";
            
            // توليد تفاحة بعيدة عن الثعبان
            const snakeSet = new Set(snake.map(s => `${s.x},${s.y}`));
            let freeCells = [];
            for(let i=0; i<GRID_SIZE; i++) {
                for(let j=0; j<GRID_SIZE; j++) {
                    if(!snakeSet.has(`${i},${j}`)) freeCells.push({x:i, y:j});
                }
            }
            if(freeCells.length > 0) {
                const rand = Math.floor(Math.random() * freeCells.length);
                food = freeCells[rand];
            } else {
                food = { x: 5, y: 5 }; // fallback
            }
            
            // بدء اللوب الجديد
            gameLoop = setInterval(updateGame, gameSpeed);
            drawCanvas(); // رسم فوري
        }
        
        // تحديث حالة اللعبة (الحركة، الأكل، الاصطدام)
        function updateGame() {
            if (!gameRunning) return;
            
            // 1. اعتماد الاتجاه الجديد (منع الرجوع للخلف)
            let newDir = nextDirection;
            if ((newDir === 'RIGHT' && direction === 'LEFT') ||
                (newDir === 'LEFT' && direction === 'RIGHT') ||
                (newDir === 'UP' && direction === 'DOWN') ||
                (newDir === 'DOWN' && direction === 'UP')) {
                newDir = direction;
            }
            direction = newDir;
            
            // 2. حساب الرأس الجديد
            let newHead = { ...snake[0] };
            switch(direction) {
                case 'RIGHT': newHead.x += 1; break;
                case 'LEFT':  newHead.x -= 1; break;
                case 'UP':    newHead.y -= 1; break;
                case 'DOWN':  newHead.y += 1; break;
                default: break;
            }
            
            // التحقق من أكل التفاحة أولاً (لحساب الذيل)
            const willEat = (newHead.x === food.x && newHead.y === food.y);
            
            // تنفيذ الحركة: إضافة الرأس
            snake.unshift(newHead);
            if (!willEat) {
                snake.pop();
            } else {
                // أكل التفاحة: زيادة النتيجة و توليد تفاحة جديدة
                score++;
                scoreSpan.innerText = score;
                const success = generateRandomFood();
                if (!success) {
                    // إذا لم يعد مكان للتفاحة (فوز تلقائي)
                    if (gameRunning) gameWin();
                    drawCanvas();
                    return;
                }
            }
            
            // 3. التحقق من الاصطدام بالحدود أو بالجسم
            const head = snake[0];
            // حدود
            if (head.x < 0 || head.x >= GRID_SIZE || head.y < 0 || head.y >= GRID_SIZE) {
                gameOver();
                drawCanvas();
                return;
            }
            // التحقق من اصطدام بالجسم (تجاهل الرأس لأنه أول عنصر)
            for (let i = 1; i < snake.length; i++) {
                if (snake[i].x === head.x && snake[i].y === head.y) {
                    gameOver();
                    drawCanvas();
                    return;
                }
            }
            
            // كل شيء سليم، نعيد الرسم
            drawCanvas();
        }
        
        // ---------- الرسم المبهج (سلم + تفاحة) ----------
        function drawCanvas() {
            if (!ctx) return;
            // خلفية شبكية تشبه ألواح السلم
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // رسم شبكة خفيفة
            for (let i = 0; i <= GRID_SIZE; i++) {
                ctx.beginPath();
                ctx.strokeStyle = "#e0cba080";
                ctx.lineWidth = 0.8;
                ctx.moveTo(i * CELL_SIZE, 0);
                ctx.lineTo(i * CELL_SIZE, canvas.height);
                ctx.stroke();
                ctx.moveTo(0, i * CELL_SIZE);
                ctx.lineTo(canvas.width, i * CELL_SIZE);
                ctx.stroke();
            }
            
            // رسم التفاحة (ذات تدرج وورقة)
            ctx.shadowBlur = 0;
            const fx = food.x * CELL_SIZE;
            const fy = food.y * CELL_SIZE;
            // ظل خفيف
            ctx.shadowColor = "rgba(0,0,0,0.2)";
            ctx.shadowBlur = 4;
            // جسد التفاحة
            ctx.beginPath();
            ctx.arc(fx + CELL_SIZE/2, fy + CELL_SIZE/2, CELL_SIZE * 0.38, 0, Math.PI*2);
            ctx.fillStyle = "#e34234";
            ctx.fill();
            ctx.beginPath();
            ctx.arc(fx + CELL_SIZE/2 - 2, fy + CELL_SIZE/2 - 3, 3, 0, Math.PI*2);
            ctx.fillStyle = "#ff6b4a";
            ctx.fill();
            // ورقة التفاحة
            ctx.fillStyle = "#6b8e23";
            ctx.beginPath();
            ctx.ellipse(fx + CELL_SIZE*0.7, fy + CELL_SIZE*0.25, 5, 8, -0.4, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = "#a5c639";
            ctx.beginPath();
            ctx.ellipse(fx + CELL_SIZE*0.65, fy + CELL_SIZE*0.22, 3, 6, -0.3, 0, Math.PI*2);
            ctx.fill();
            // غمازة
            ctx.fillStyle = "#a1321f";
            ctx.beginPath();
            ctx.arc(fx + CELL_SIZE*0.65, fy + CELL_SIZE*0.45, 1.8, 0, Math.PI*2);
            ctx.fill();
            
            // رسم الثعبان (على شكل كرات خضراء متدرجة + لمعان)
            for (let i = 0; i < snake.length; i++) {
                const seg = snake[i];
                const sx = seg.x * CELL_SIZE;
                const sy = seg.y * CELL_SIZE;
                const radius = CELL_SIZE * 0.42;
                const grad = ctx.createRadialGradient(sx+6, sy+6, 3, sx+CELL_SIZE/2, sy+CELL_SIZE/2, radius);
                if (i === 0) {
                    grad.addColorStop(0, "#6fbf4c");
                    grad.addColorStop(1, "#3c9e2d");
                } else {
                    grad.addColorStop(0, "#5ca832");
                    grad.addColorStop(1, "#2f7d1f");
                }
                ctx.beginPath();
                ctx.arc(sx + CELL_SIZE/2, sy + CELL_SIZE/2, radius, 0, Math.PI*2);
                ctx.fillStyle = grad;
                ctx.fill();
                ctx.shadowBlur = 2;
                // عيون الثعبان للرأس
                if (i === 0) {
                    ctx.fillStyle = "white";
                    ctx.beginPath();
                    ctx.arc(sx + CELL_SIZE*0.65, sy + CELL_SIZE*0.35, 4, 0, Math.PI*2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(sx + CELL_SIZE*0.35, sy + CELL_SIZE*0.35, 4, 0, Math.PI*2);
                    ctx.fill();
                    ctx.fillStyle = "#0a2f1a";
                    ctx.beginPath();
                    ctx.arc(sx + CELL_SIZE*0.68, sy + CELL_SIZE*0.33, 2, 0, Math.PI*2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(sx + CELL_SIZE*0.38, sy + CELL_SIZE*0.33, 2, 0, Math.PI*2);
                    ctx.fill();
                    // لسان اختياري
                    ctx.beginPath();
                    ctx.moveTo(sx + CELL_SIZE*0.5, sy + CELL_SIZE*0.65);
                    ctx.lineTo(sx + CELL_SIZE*0.45, sy + CELL_SIZE*0.78);
                    ctx.lineTo(sx + CELL_SIZE*0.55, sy + CELL_SIZE*0.78);
                    ctx.fillStyle = "#e34234";
                    ctx.fill();
                } else {
                    // نقوش بسيطة
                    ctx.fillStyle = "#d9e66b30";
                    ctx.beginPath();
                    ctx.arc(sx + CELL_SIZE*0.3, sy + CELL_SIZE*0.5, 3, 0, Math.PI*2);
                    ctx.fill();
                }
            }
            ctx.shadowBlur = 0;
            
            // إضافة تأثير "سلم" – درجات خشبية على الحواف
            ctx.fillStyle = "#c49a6c30";
            for (let i=0; i<GRID_SIZE; i+=2) {
                ctx.fillRect(0, i*CELL_SIZE+CELL_SIZE-3, canvas.width, 2);
            }
            
            // إذا انتهت اللعبة نضع طبقة شفاف مع نص
            if (!gameRunning) {
                ctx.globalAlpha = 0.75;
                ctx.fillStyle = "#1a2a10";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.globalAlpha = 1;
                ctx.font = `bold ${Math.floor(CELL_SIZE * 1.5)}px "Segoe UI", system-ui`;
                ctx.fillStyle = "#fdebb3";
                ctx.shadowBlur = 0;
                ctx.textAlign = "center";
                if (statusDiv.innerText.includes('فوز')) {
                    ctx.fillText("🎉 فوز عظيم 🎉", canvas.width/2, canvas.height/2);
                    ctx.font = `18px monospace`;
                    ctx.fillText("اضغط 'سلم جديد'", canvas.width/2, canvas.height/2+45);
                } else if (statusDiv.innerText.includes('انتهت')) {
                    ctx.fillText("😵 انتهى السلم 😵", canvas.width/2, canvas.height/2);
                    ctx.font = `16px monospace`;
                    ctx.fillText("إضغط 'سلم جديد'", canvas.width/2, canvas.height/2+45);
                } else {
                    ctx.fillText("إضغط لإعادة", canvas.width/2, canvas.height/2);
                }
                ctx.textAlign = "left";
            }
        }
        
        // ---------- التحكم بالأسهم ----------
        function handleKeyDown(e) {
            if (!gameRunning) return;  // لا نغير الاتجاه إذا انتهت اللعبة ولكن يمكن إعادة الضبط بالزر
            const key = e.key;
            e.preventDefault();  // منع تمرير الصفحة
            switch(key) {
                case 'ArrowUp': nextDirection = 'UP'; break;
                case 'ArrowDown': nextDirection = 'DOWN'; break;
                case 'ArrowLeft': nextDirection = 'LEFT'; break;
                case 'ArrowRight': nextDirection = 'RIGHT'; break;
                default: return;
            }
        }
        
        // منع الأسهم من تحريك الصفحة أيضاً
        window.addEventListener('keydown', function(e) {
            if (e.key === 'ArrowUp' || e.key === 'ArrowDown' || e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
                e.preventDefault();
            }
        });
        document.addEventListener('keydown', handleKeyDown);
        
        // زر إعادة التشغيل
        const resetBtn = document.getElementById('resetButton');
        resetBtn.addEventListener('click', () => {
            resetGame();
        });
        
        // بدء اللعبة لأول مرة
        resetGame();
        
        // دعم اللمس للأجهزة اللوحية - تلميح بسيط (يمكن إضافة أزرار لكن الأسهم تعمل على لوحة مفاتيح خارجية، ولكن لمستخدمي الشاشات اللمسية نضيف إشارة)
        // لا نضيف تعقيد زائد لكن المستخدم يمكنه استخدام لوحة المفاتيح أو نعرض تنبيه أن اللعبة مصممة للأسهم.
        // اختياري: إضافة إشارات على الشاشة للموبايل بشكل بسيط
        function handleTouchSwipe() { /* كتلميح اختياري، اللعبة متوافقة مع الأسهم فقط لكن على الموبايل يمكن إضافة أزرار? سريعاً: */
            // نضيف div أزرار إذا كان الجهاز لمسي، لكن لتجنب تعقيد الكود، نكتفي بالنص التنبيهي.
        }
        
        // رسم أولي بعد إعادة الضبط
        drawCanvas();
    })();
</script>
</body>
</html>
